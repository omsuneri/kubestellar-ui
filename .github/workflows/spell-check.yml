name: Check Spelling

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request_target:
    branches:
      - "**"
    types: [opened, reopened, synchronize]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spelling:
    name: Check Spelling
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    env:
      # Force all temp files to use workspace directory
      TMPDIR: ${{ github.workspace }}/.spelling-tmp
      TMP: ${{ github.workspace }}/.spelling-tmp
      TEMP: ${{ github.workspace }}/.spelling-tmp
    steps:
      - name: Setup environment
        run: |
          mkdir -p "$TMPDIR"
          chmod 777 "$TMPDIR"
          echo "Using temp directory: $TMPDIR"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run spell check
        uses: check-spelling/check-spelling@v0.0.26
        with:
          suppress_push_for_open_pull_request: 1
          check_file_names: 1
          post_comment: 0
          extra_dictionaries: |
            cspell:software-terms/dict/softwareTerms.txt
            cspell:node/node.txt
            cspell:python/src/python/python-lib.txt
            cspell:shell/dict/shell-all-words.txt

      - name: Cleanup temp files
        if: always()
        run: rm -rf "$TMPDIR"

  comment-push:
    name: Report (Push)
    runs-on: ubuntu-latest
    needs: spelling
    permissions:
      contents: write
    if: (success() || failure()) && needs.spelling.outputs.followup && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: check-spelling/check-spelling@v0.0.26
        env:
          TMPDIR: ${{ runner.workspace }}/spelling-comment-tmp
        with:
          checkout: true
          spell_check_this: check-spelling/spell-check-this@v0.0.26
          task: ${{ needs.spelling.outputs.followup }}
          internal_state_directory: ${{ needs.spelling.outputs.internal_state_directory }}
          caller_container: ${{ needs.spelling.outputs.docker_container }}

  comment-pr:
    name: Report (PR)
    runs-on: ubuntu-latest
    needs: spelling
    permissions:
      pull-requests: write
    if: (success() || failure()) && needs.spelling.outputs.followup && contains(github.event_name, 'pull_request')
    steps:
      - uses: actions/checkout@v4
      - uses: check-spelling/check-spelling@v0.0.26
        env:
          TMPDIR: ${{ runner.workspace }}/spelling-comment-tmp
        with:
          checkout: true
          spell_check_this: check-spelling/spell-check-this@v0.0.26
          task: ${{ needs.spelling.outputs.followup }}
          internal_state_directory: ${{ needs.spelling.outputs.internal_state_directory }}
          caller_container: ${{ needs.spelling.outputs.docker_container }}
          experimental_apply_changes_via_bot: 1

  update:
    name: Update Expect List
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@check-spelling-bot apply') }}
    concurrency:
      group: spelling-update-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: check-spelling/check-spelling@v0.0.26
        env:
          TMPDIR: ${{ runner.workspace }}/spelling-update-tmp
        with:
          experimental_apply_changes_via_bot: 1
          checkout: false
          ssh_key: "${{ secrets.CHECK_SPELLING }}"
          
